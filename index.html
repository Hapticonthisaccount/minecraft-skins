<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Minecraft Skin Maker</title>
<style>
  body { font-family: sans-serif; padding: 24px; max-width: 900px; margin: 0 auto; background: #fff; }
  h2 { margin: 0 0 20px; }
  label { display: block; margin-bottom: 6px; font-weight: bold; }
  .section { margin-bottom: 20px; }
  .parts { display: flex; flex-wrap: wrap; gap: 8px; }
  .parts label { font-weight: normal; display: flex; align-items: center; gap: 4px; font-size: 14px; }
  .sliders { display: grid; grid-template-columns: 1fr 1fr; gap: 12px 24px; }
  .slider-group label { font-weight: normal; font-size: 14px; margin-bottom: 4px; }
  input[type=range] { width: 100%; }
  canvas { image-rendering: pixelated; display: block; }
  button { padding: 8px 20px; font-size: 15px; cursor: pointer; }
  #drop { border: 2px dashed #aaa; padding: 20px; text-align: center; cursor: pointer; color: #555; border-radius: 4px; }
  #drop:hover { border-color: #555; }
  #controls { display: none; }
  .previews { display: flex; gap: 32px; align-items: flex-start; flex-wrap: wrap; margin-bottom: 20px; }
  .preview-box { display: flex; flex-direction: column; gap: 6px; }
  .preview-box label { font-weight: bold; margin-bottom: 0; }
  #imgPreview { max-width: 200px; max-height: 200px; border: 1px solid #ccc; object-fit: contain; display: block; }
  #skinPreview { border: 1px solid #ccc; background: #e8f4e8; }
  #uvPreview { border: 1px solid #ccc; }
</style>
</head>
<body>

<h2>Minecraft Skin Maker</h2>

<div class="section">
  <label>Image</label>
  <div id="drop" onclick="document.getElementById('fileInput').click()">
    Click to choose an image (or drag & drop)
  </div>
  <input type="file" id="fileInput" accept="image/*" style="display:none">
</div>

<div id="controls">

  <div class="section">
    <label>Apply to</label>
    <div class="parts" id="partChecks"></div>
  </div>

  <div class="section sliders">
    <div class="slider-group">
      <label id="detailLabel">Pixel size: 4</label>
      <input type="range" id="detail" min="1" max="8" value="4">
    </div>
    <div class="slider-group">
      <label id="zoomLabel">Zoom: 100%</label>
      <input type="range" id="zoom" min="100" max="400" step="5" value="100">
    </div>
    <div class="slider-group">
      <label id="panXLabel">Pan X: 50%</label>
      <input type="range" id="panX" min="0" max="100" value="50">
    </div>
    <div class="slider-group">
      <label id="panYLabel">Pan Y: 50%</label>
      <input type="range" id="panY" min="0" max="100" value="50">
    </div>
  </div>

  <div class="previews">
    <div class="preview-box">
      <label>Your image</label>
      <img id="imgPreview" src="" alt="uploaded image">
    </div>
    <div class="preview-box">
      <label>Character preview</label>
      <canvas id="skinPreview" width="144" height="256"></canvas>
    </div>
    <div class="preview-box">
      <label>Skin UV map (64×64)</label>
      <canvas id="uvPreview" width="256" height="256"></canvas>
    </div>
  </div>

  <button onclick="download()">Download skin.png</button>
</div>

<script>
const PARTS = {
  face:     { x:8,  y:8,  w:8, h:8  },
  headTop:  { x:8,  y:0,  w:8, h:8  },
  headBack: { x:24, y:8,  w:8, h:8  },
  body:     { x:20, y:20, w:8, h:12 },
  bodyBack: { x:32, y:20, w:8, h:12 },
  rightArm: { x:44, y:20, w:4, h:12 },
  leftArm:  { x:36, y:52, w:4, h:12 },
  rightLeg: { x:4,  y:20, w:4, h:12 },
  leftLeg:  { x:20, y:52, w:4, h:12 },
};
const LABELS = {
  face:"Face", headTop:"Head Top", headBack:"Head Back",
  body:"Body Front", bodyBack:"Body Back",
  rightArm:"Right Arm", leftArm:"Left Arm",
  rightLeg:"Right Leg", leftLeg:"Left Leg"
};

// Character 2D layout: each part -> where to draw on character canvas (at 8x scale)
// Canvas is 144x256 (18x32 tiles at 8px each)
const CHAR_LAYOUT = {
  face:     { dx: 8,  dy: 0,  dw: 64, dh: 64 },   // head 8x8 -> 64x64
  body:     { dx: 8,  dy: 64, dw: 64, dh: 96 },   // body 8x12 -> 64x96
  rightArm: { dx: 0,  dy: 64, dw: 32, dh: 96 },   // arm 4x12 -> 32x96 (on left side of screen = char's right)
  leftArm:  { dx: 112,dy: 64, dw: 32, dh: 96 },   // arm on right of screen
  rightLeg: { dx: 8,  dy: 160,dw: 32, dh: 96 },   // leg
  leftLeg:  { dx: 40, dy: 160,dw: 32, dh: 96 },
};

let sourceImg = null;

// Build checkboxes
const partChecks = document.getElementById('partChecks');
Object.keys(PARTS).forEach(k => {
  const lbl = document.createElement('label');
  const cb = document.createElement('input');
  cb.type = 'checkbox'; cb.id = 'cb_' + k; cb.checked = true;
  cb.addEventListener('change', render);
  lbl.appendChild(cb);
  lbl.appendChild(document.createTextNode(' ' + LABELS[k]));
  partChecks.appendChild(lbl);
});

document.getElementById('fileInput').addEventListener('change', e => {
  const file = e.target.files[0];
  if (!file) return;
  loadFile(file);
});

const drop = document.getElementById('drop');
drop.addEventListener('dragover', e => { e.preventDefault(); drop.style.borderColor='#333'; });
drop.addEventListener('dragleave', () => { drop.style.borderColor='#aaa'; });
drop.addEventListener('drop', e => {
  e.preventDefault(); drop.style.borderColor='#aaa';
  const file = e.dataTransfer.files[0];
  if (file && file.type.startsWith('image/')) loadFile(file);
});

function loadFile(file) {
  const url = URL.createObjectURL(file);
  // Show image preview
  const imgEl = document.getElementById('imgPreview');
  imgEl.src = url;

  const img = new Image();
  img.onload = () => {
    sourceImg = img;
    drop.innerHTML = '<strong>' + file.name + '</strong> — click to change';
    document.getElementById('controls').style.display = 'block';
    render();
  };
  img.src = url;
}

['detail','zoom','panX','panY'].forEach(id => {
  document.getElementById(id).addEventListener('input', () => {
    const v = document.getElementById(id).value;
    document.getElementById(id+'Label').textContent =
      id === 'detail' ? 'Pixel size: ' + v :
      id === 'zoom'   ? 'Zoom: ' + v + '%' :
      id === 'panX'   ? 'Pan X: ' + v + '%' :
                        'Pan Y: ' + v + '%';
    render();
  });
});

function buildSkin() {
  const canvas = document.createElement('canvas');
  canvas.width = 64; canvas.height = 64;
  const ctx = canvas.getContext('2d');
  ctx.clearRect(0,0,64,64);

  const detail = parseInt(document.getElementById('detail').value);
  const zoom   = parseInt(document.getElementById('zoom').value) / 100;
  const panX   = parseInt(document.getElementById('panX').value) / 100;
  const panY   = parseInt(document.getElementById('panY').value) / 100;

  const sw = sourceImg.naturalWidth, sh = sourceImg.naturalHeight;
  const cw = sw / zoom, ch = sh / zoom;
  const ox = panX * (sw - cw);
  const oy = panY * (sh - ch);

  const src = document.createElement('canvas');
  src.width = sw; src.height = sh;
  src.getContext('2d').drawImage(sourceImg, 0, 0);

  Object.keys(PARTS).forEach(k => {
    if (!document.getElementById('cb_' + k).checked) return;
    const p = PARTS[k];
    const pw = Math.max(1, Math.round(p.w / detail));
    const ph = Math.max(1, Math.round(p.h / detail));

    const tiny = document.createElement('canvas');
    tiny.width = pw; tiny.height = ph;
    const tc = tiny.getContext('2d');
    tc.imageSmoothingEnabled = false;
    tc.drawImage(src, ox, oy, cw, ch, 0, 0, pw, ph);

    const scaled = document.createElement('canvas');
    scaled.width = p.w; scaled.height = p.h;
    const sc = scaled.getContext('2d');
    sc.imageSmoothingEnabled = false;
    sc.drawImage(tiny, 0, 0, p.w, p.h);

    ctx.imageSmoothingEnabled = false;
    ctx.drawImage(scaled, p.x, p.y, p.w, p.h);
  });

  return canvas;
}

function drawCharacterPreview(skin) {
  const canvas = document.getElementById('skinPreview');
  const ctx = canvas.getContext('2d');
  ctx.clearRect(0, 0, canvas.width, canvas.height);

  // Light background
  ctx.fillStyle = '#ddeedd';
  ctx.fillRect(0, 0, canvas.width, canvas.height);

  // For each visible front-facing part, draw from the skin UV
  const partsToShow = ['face', 'body', 'rightArm', 'leftArm', 'rightLeg', 'leftLeg'];
  partsToShow.forEach(k => {
    const p = PARTS[k];
    const c = CHAR_LAYOUT[k];
    if (!c) return;
    ctx.imageSmoothingEnabled = false;
    ctx.drawImage(skin, p.x, p.y, p.w, p.h, c.dx, c.dy, c.dw, c.dh);
  });
}

function render() {
  if (!sourceImg) return;
  const skin = buildSkin();

  // UV preview
  const uvCtx = document.getElementById('uvPreview').getContext('2d');
  uvCtx.clearRect(0, 0, 256, 256);
  uvCtx.imageSmoothingEnabled = false;
  uvCtx.drawImage(skin, 0, 0, 256, 256);

  // Character preview
  drawCharacterPreview(skin);
}

function download() {
  if (!sourceImg) return;
  const skin = buildSkin();
  const a = document.createElement('a');
  a.download = 'skin.png';
  a.href = skin.toDataURL('image/png');
  a.click();
}
</script>
</body>
</html>
