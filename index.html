<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Minecraft Skin Maker</title>
<style>
  body { font-family: sans-serif; padding: 24px; max-width: 900px; margin: 0 auto; background: #fff; }
  h2 { margin: 0 0 6px; }
  p { margin: 0 0 20px; color: #555; font-size: 14px; }
  .section { margin-bottom: 18px; }
  label.bold { display: block; margin-bottom: 6px; font-weight: bold; }
  .sliders { display: grid; grid-template-columns: 1fr 1fr; gap: 12px 24px; margin-bottom: 18px; }
  .slider-group > label { display: block; font-size: 14px; margin-bottom: 3px; }
  input[type=range] { width: 100%; }
  canvas { image-rendering: pixelated; display: block; }
  button { padding: 8px 20px; font-size: 15px; cursor: pointer; }
  #drop { border: 2px dashed #aaa; padding: 20px; text-align: center; cursor: pointer; color: #555; border-radius: 4px; margin-bottom: 18px; }
  #drop:hover { border-color: #333; }
  #controls { display: none; }
  .previews { display: flex; gap: 32px; align-items: flex-start; flex-wrap: wrap; margin-bottom: 20px; }
  .preview-box > label { font-weight: bold; display: block; margin-bottom: 6px; }
  .checkrow { display: flex; gap: 16px; align-items: center; margin-bottom: 18px; font-size: 14px; }
  .checkrow label { display: flex; align-items: center; gap: 4px; }
</style>
</head>
<body>

<h2>Minecraft Skin Maker</h2>
<p>Your image stretches across the whole front (and/or back) as one piece — not tiled per body part.</p>

<div id="drop" onclick="document.getElementById('fileInput').click()">
  Click to choose an image (or drag & drop)
</div>
<input type="file" id="fileInput" accept="image/*" style="display:none">

<div id="controls">

  <div class="checkrow">
    <strong>Apply to:</strong>
    <label><input type="checkbox" id="doFront" checked onchange="render()"> Front</label>
    <label><input type="checkbox" id="doBack" checked onchange="render()"> Back</label>
  </div>

  <div class="sliders">
    <div class="slider-group">
      <label id="zoomLabel">Zoom: 100%</label>
      <input type="range" id="zoom" min="100" max="400" step="5" value="100" oninput="syncLabel(this,'zoom','Zoom',true);render()">
    </div>
    <div class="slider-group">
      <label id="panXLabel">Pan X: 50%</label>
      <input type="range" id="panX" min="0" max="100" value="50" oninput="syncLabel(this,'panX','Pan X',true);render()">
    </div>
    <div class="slider-group">
      <label id="panYLabel">Pan Y: 50%</label>
      <input type="range" id="panY" min="0" max="100" value="50" oninput="syncLabel(this,'panY','Pan Y',true);render()">
    </div>
  </div>

  <div class="previews">
    <div class="preview-box">
      <label>Your image</label>
      <img id="imgPreview" src="" style="max-width:180px;max-height:260px;border:1px solid #ccc;display:block;">
    </div>
    <div class="preview-box">
      <label>Character (front view)</label>
      <!-- 16 wide x 32 tall, shown at 8x = 128x256 -->
      <canvas id="charPreview" width="128" height="256" style="border:1px solid #ccc;background:#d0e8d0;"></canvas>
    </div>
    <div class="preview-box">
      <label>Skin UV map (64×64)</label>
      <canvas id="uvPreview" width="256" height="256" style="border:1px solid #ccc;"></canvas>
    </div>
  </div>

  <button onclick="download()">Download skin.png</button>
</div>

<script>
// The character front is 16px wide x 32px tall in skin pixels.
// Layout:
//   Head face  : char x=4..12, y=0..8    -> UV (8,8,8,8)
//   Right arm F: char x=0..4,  y=8..20   -> UV (44,20,4,12)
//   Body front : char x=4..12, y=8..20   -> UV (20,20,8,12)
//   Left arm F : char x=12..16,y=8..20   -> UV (36,52,4,12)
//   Right leg F: char x=4..8,  y=20..32  -> UV (4,20,4,12)
//   Left leg F : char x=8..12, y=20..32  -> UV (20,52,4,12)
//
// Character back is also 16x32 (mirrored left/right):
//   Head back  : char x=4..12, y=0..8    -> UV (24,8,8,8)
//   Right arm B: char x=12..16,y=8..20   -> UV (48,20,4,12)   (mirrored)
//   Body back  : char x=4..12, y=8..20   -> UV (32,20,8,12)
//   Left arm B : char x=0..4,  y=8..20   -> UV (40,52,4,12)   (mirrored)
//   Right leg B: char x=8..12, y=20..32  -> UV (8,20,4,12)    (mirrored)
//   Left leg B : char x=4..8,  y=20..32  -> UV (24,52,4,12)   (mirrored)

const FRONT_PARTS = [
  { cx:4,  cy:0,  cw:8, ch:8,  ux:8,  uy:8,  uw:8, uh:8,  flip:false }, // face
  { cx:0,  cy:8,  cw:4, ch:12, ux:44, uy:20, uw:4, uh:12, flip:false }, // right arm front
  { cx:4,  cy:8,  cw:8, ch:12, ux:20, uy:20, uw:8, uh:12, flip:false }, // body front
  { cx:12, cy:8,  cw:4, ch:12, ux:36, uy:52, uw:4, uh:12, flip:false }, // left arm front
  { cx:4,  cy:20, cw:4, ch:12, ux:4,  uy:20, uw:4, uh:12, flip:false }, // right leg front
  { cx:8,  cy:20, cw:4, ch:12, ux:20, uy:52, uw:4, uh:12, flip:false }, // left leg front
];

const BACK_PARTS = [
  { cx:4,  cy:0,  cw:8, ch:8,  ux:24, uy:8,  uw:8, uh:8,  flip:true  }, // head back
  { cx:12, cy:8,  cw:4, ch:12, ux:48, uy:20, uw:4, uh:12, flip:true  }, // right arm back
  { cx:4,  cy:8,  cw:8, ch:12, ux:32, uy:20, uw:8, uh:12, flip:true  }, // body back
  { cx:0,  cy:8,  cw:4, ch:12, ux:40, uy:52, uw:4, uh:12, flip:true  }, // left arm back
  { cx:8,  cy:20, cw:4, ch:12, ux:8,  uy:20, uw:4, uh:12, flip:true  }, // right leg back
  { cx:4,  cy:20, cw:4, ch:12, ux:24, uy:52, uw:4, uh:12, flip:true  }, // left leg back
];

let sourceImg = null;

function syncLabel(el, id, name, pct) {
  document.getElementById(id+'Label').textContent = name + ': ' + el.value + (pct?'%':'');
}

document.getElementById('fileInput').addEventListener('change', e => {
  const f = e.target.files[0]; if (!f) return; loadFile(f);
});
const drop = document.getElementById('drop');
drop.addEventListener('dragover', e => { e.preventDefault(); drop.style.borderColor='#333'; });
drop.addEventListener('dragleave', () => drop.style.borderColor='#aaa');
drop.addEventListener('drop', e => {
  e.preventDefault(); drop.style.borderColor='#aaa';
  const f = e.dataTransfer.files[0];
  if (f && f.type.startsWith('image/')) loadFile(f);
});

function loadFile(file) {
  const url = URL.createObjectURL(file);
  document.getElementById('imgPreview').src = url;
  const img = new Image();
  img.onload = () => {
    sourceImg = img;
    drop.innerHTML = '<strong>' + file.name + '</strong> — click to change';
    document.getElementById('controls').style.display = 'block';
    render();
  };
  img.src = url;
}

// Returns a 16x32 canvas of the image cropped/zoomed
function getCharCanvas() {
  const zoom = parseInt(document.getElementById('zoom').value) / 100;
  const panX = parseInt(document.getElementById('panX').value) / 100;
  const panY = parseInt(document.getElementById('panY').value) / 100;
  const sw = sourceImg.naturalWidth, sh = sourceImg.naturalHeight;
  const cw = sw / zoom, ch = sh / zoom;
  const ox = panX * (sw - cw);
  const oy = panY * (sh - ch);

  const c = document.createElement('canvas');
  c.width = 16; c.height = 32;
  const ctx = c.getContext('2d');
  ctx.imageSmoothingEnabled = false;
  ctx.drawImage(sourceImg, ox, oy, cw, ch, 0, 0, 16, 32);
  return c;
}

function buildSkin(charCanvas) {
  const skin = document.createElement('canvas');
  skin.width = 64; skin.height = 64;
  const ctx = skin.getContext('2d');
  ctx.clearRect(0,0,64,64);

  const doFront = document.getElementById('doFront').checked;
  const doBack  = document.getElementById('doBack').checked;

  function pastePart(p) {
    // Crop cx,cy,cw,ch from charCanvas -> paste to ux,uy in skin (possibly flipped)
    const tmp = document.createElement('canvas');
    tmp.width = p.uw; tmp.height = p.uh;
    const tc = tmp.getContext('2d');
    tc.imageSmoothingEnabled = false;
    if (p.flip) {
      tc.translate(p.uw, 0);
      tc.scale(-1, 1);
    }
    tc.drawImage(charCanvas, p.cx, p.cy, p.cw, p.ch, 0, 0, p.uw, p.uh);
    ctx.imageSmoothingEnabled = false;
    ctx.drawImage(tmp, p.ux, p.uy, p.uw, p.uh);
  }

  if (doFront) FRONT_PARTS.forEach(pastePart);
  if (doBack)  BACK_PARTS.forEach(pastePart);

  return skin;
}

function render() {
  if (!sourceImg) return;
  const charCanvas = getCharCanvas();
  const skin = buildSkin(charCanvas);

  // Character preview at 8x
  const cp = document.getElementById('charPreview');
  const cc = cp.getContext('2d');
  cc.clearRect(0,0,128,256);
  cc.fillStyle='#d0e8d0'; cc.fillRect(0,0,128,256);
  cc.imageSmoothingEnabled = false;
  cc.drawImage(charCanvas, 0, 0, 128, 256);

  // UV preview
  const uv = document.getElementById('uvPreview').getContext('2d');
  // checkerboard bg
  for (let y=0;y<64;y++) for (let x=0;x<64;x++) {
    uv.fillStyle = (x+y)%2===0?'#ccc':'#eee';
    uv.fillRect(x*4,y*4,4,4);
  }
  uv.imageSmoothingEnabled = false;
  uv.drawImage(skin, 0, 0, 256, 256);
}

function download() {
  if (!sourceImg) return;
  const charCanvas = getCharCanvas();
  const skin = buildSkin(charCanvas);
  const a = document.createElement('a');
  a.download = 'skin.png';
  a.href = skin.toDataURL('image/png');
  a.click();
}
</script>
</body>
</html>
